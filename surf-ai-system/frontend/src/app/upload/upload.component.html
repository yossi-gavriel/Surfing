<div class="upload-container">
  <h2>מערכת זיהוי גולשים חכמה</h2>
  <div class="card">
    <div class="file-drop-area">
      <p style="font-size: 1.15rem; color: #475569; margin-bottom: 1rem; font-weight: 500;">העלה תמונה ברורה עדכנית של פני הגולש לזיהוי ברשת המצלמות</p>
      <input type="file" accept="image/*" (change)="onFileSelected($event)" [disabled]="isUploading()" />
    </div>
    
    <div *ngIf="isUploading()" class="loading">
      <div class="spinner"></div>
      <p style="font-size: 1.1rem;">מנתח ובונה פרופיל תלת מימדי...</p>
    </div>
    
    <div *ngIf="errorMessage()" class="error">
      {{ errorMessage() }}
    </div>
  </div>
</div>
